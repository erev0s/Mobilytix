name: Publish Images

on:
  workflow_dispatch:
    inputs:
      image_repository:
        description: "Docker Hub repository, for example erev0s/mobilytix"
        required: true
        default: "erev0s/mobilytix"
      image_tag:
        description: "Base image tag to publish; workflow prefixes it with static- or android-"
        required: true
        default: "latest"
      publish_latest:
        description: "Also publish static-latest and android-latest tags"
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  publish-static:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare static image metadata
        id: static_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image_repository }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=static-${{ inputs.image_tag }}
            type=raw,value=static-latest,enable=${{ inputs.publish_latest }}
          labels: |
            org.opencontainers.image.title=Mobilytix Static Runtime
            org.opencontainers.image.description=Mobilytix MCP server and static Android analysis tools
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push static image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/static/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.static_meta.outputs.tags }}
          labels: ${{ steps.static_meta.outputs.labels }}

  publish-android:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare android image metadata
        id: android_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image_repository }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=android-${{ inputs.image_tag }}
            type=raw,value=android-latest,enable=${{ inputs.publish_latest }}
          labels: |
            org.opencontainers.image.title=Mobilytix Android Runtime
            org.opencontainers.image.description=Mobilytix Android emulator and dynamic analysis helpers
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push android image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/android/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.android_meta.outputs.tags }}
          labels: ${{ steps.android_meta.outputs.labels }}
