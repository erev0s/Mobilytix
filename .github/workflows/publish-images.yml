name: Publish Images

on:
  workflow_dispatch:
    inputs:
      image_namespace:
        description: "GHCR namespace, for example ghcr.io/acme"
        required: true
        default: "ghcr.io/erev0s"
      image_tag:
        description: "Image tag to publish"
        required: true
        default: "latest"
      publish_latest:
        description: "Also publish the latest tag"
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

jobs:
  publish-static:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare static image metadata
        id: static_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image_namespace }}/mobilytix-static
          tags: |
            type=raw,value=${{ inputs.image_tag }}
            type=raw,value=latest,enable=${{ inputs.publish_latest }}
          labels: |
            org.opencontainers.image.title=Mobilytix Static Runtime
            org.opencontainers.image.description=Mobilytix MCP server and static Android analysis tools
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push static image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/static/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.static_meta.outputs.tags }}
          labels: ${{ steps.static_meta.outputs.labels }}

  publish-android:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare android image metadata
        id: android_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image_namespace }}/mobilytix-android
          tags: |
            type=raw,value=${{ inputs.image_tag }}
            type=raw,value=latest,enable=${{ inputs.publish_latest }}
          labels: |
            org.opencontainers.image.title=Mobilytix Android Runtime
            org.opencontainers.image.description=Mobilytix Android emulator and dynamic analysis helpers
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push android image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/android/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.android_meta.outputs.tags }}
          labels: ${{ steps.android_meta.outputs.labels }}
